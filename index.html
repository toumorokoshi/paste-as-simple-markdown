<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paste as Simple Markdown</title>

    <!-- SEO and Production Metadata -->
    <meta
      name="description"
      content="A lightweight, modern web application that converts pasted rich text into clean Markdown and translates LaTeX equations into readable plaintext Unicode characters."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2c3e50" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://yusuke.github.io/paste-as-simple-markdown/"
    />
    <meta property="og:title" content="Paste as Simple Markdown" />
    <meta
      property="og:description"
      content="Convert rich text to clean Markdown and LaTeX to Unicode instantly."
    />
    <meta
      property="og:image"
      content="https://yusuke.github.io/paste-as-simple-markdown/favicon.svg"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta
      property="twitter:url"
      content="https://yusuke.github.io/paste-as-simple-markdown/"
    />
    <meta property="twitter:title" content="Paste as Simple Markdown" />
    <meta
      property="twitter:description"
      content="Convert rich text to clean Markdown and LaTeX to Unicode instantly."
    />
    <meta
      property="twitter:image"
      content="https://yusuke.github.io/paste-as-simple-markdown/favicon.svg"
    />

    <!-- Standard Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Paste as Simple Markdown</h1>
      <div class="header-actions">
        <button id="theme-toggle" aria-label="Toggle dark mode">
          <svg
            id="theme-toggle-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <!-- Sun icon (default) -->
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button id="copy-btn" aria-label="Copy Markdown to clipboard">
          Copy Markdown
        </button>
      </div>
    </header>

    <main class="split-pane">
      <section id="input-pane" class="pane" aria-labelledby="input-heading">
        <h2 id="input-heading" class="sr-only">Input Area</h2>
        <!-- Capture paste events and display Markdown here -->
        <div
          id="markdown-output"
          contenteditable="true"
          role="textbox"
          aria-multiline="true"
          aria-placeholder="Paste rich text here..."
          placeholder="Paste rich text here..."
          aria-label="Markdown output and paste area"
          aria-live="polite"
        ></div>
      </section>

      <section id="preview-pane" class="pane" aria-labelledby="preview-heading">
        <h2 id="preview-heading" class="sr-only">Live Preview</h2>
        <div
          id="preview-area"
          aria-label="Rendered Markdown Preview"
          aria-live="polite"
        ></div>
      </section>
    </main>

    <!-- Application Logic (Vite handles ESM imports for Turndown and Marked) -->
    <script type="module" src="/main.js"></script>
  </body>
</html>
